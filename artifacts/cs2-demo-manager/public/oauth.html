<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>FACEIT Anmelden</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      font-family: sans-serif; color: #888;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #FF5500;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p>Verbinde mit FACEIT&hellip;</p>
  </div>
</body>
</html>
